name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: lavalamp-linux-x64
          - os: ubuntu-24.04-arm
            asset: lavalamp-linux-arm64
          - os: macos-15-intel
            asset: lavalamp-darwin-x64
          - os: macos-15
            asset: lavalamp-darwin-arm64
          - os: windows-latest
            asset: lavalamp-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run package
      - name: Prepare release asset (Unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv dist/lavalamp "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"
          "./${{ matrix.asset }}" --version
          "./${{ matrix.asset }}" update
      - name: Prepare release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $source = if (Test-Path dist/lavalamp.exe) { 'dist/lavalamp.exe' } else { 'dist/lavalamp' }
          Move-Item $source '${{ matrix.asset }}'
          & '.\${{ matrix.asset }}' --version
          & '.\${{ matrix.asset }}' update
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum lavalamp-* > SHA256SUMS
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/lavalamp-*
          release-assets/SHA256SUMS
          --verify-tag
          --generate-notes
